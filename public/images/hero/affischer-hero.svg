<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1a2e"/>
      <stop offset="55%" stop-color="#2e1f3a"/>
      <stop offset="100%" stop-color="#2a1a25"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#D9222A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D9222A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Bakgrund -->
  <rect width="1920" height="960" fill="url(#bg)"/>
  <rect width="1920" height="960" fill="url(#dots)"/>
  <rect width="1920" height="960" fill="url(#glow)"/>

  <!-- Affisch-motiv (tre affischer på vägg, olika storlek) -->
  <g transform="translate(1100 100)">
    <!-- Bakre affisch — 50x70 stående -->
    <g opacity="0.55">
      <rect x="0" y="40" width="280" height="400" fill="#ffffff" fill-opacity="0.08" rx="2"/>
      <rect x="20" y="60" width="140" height="14" fill="#ffffff" fill-opacity="0.18"/>
      <rect x="20" y="84" width="200" height="6" fill="#ffffff" fill-opacity="0.10"/>
      <rect x="20" y="350" width="100" height="6" fill="#ffffff" fill-opacity="0.12"/>
    </g>
    <!-- Mitten-affisch — 70x100 stående -->
    <g opacity="0.75" transform="translate(220 -20)">
      <rect x="0" y="0" width="360" height="540" fill="#ffffff" fill-opacity="0.12" rx="2"/>
      <rect x="30" y="30" width="200" height="22" fill="#ffffff" fill-opacity="0.30"/>
      <rect x="30" y="62" width="260" height="10" fill="#ffffff" fill-opacity="0.15"/>
      <rect x="30" y="78" width="180" height="10" fill="#ffffff" fill-opacity="0.15"/>
      <rect x="30" y="450" width="130" height="8" fill="#ffffff" fill-opacity="0.18"/>
      <!-- Diskret accentlinje -->
      <rect x="30" y="430" width="40" height="3" fill="#D9222A" fill-opacity="0.6"/>
    </g>
    <!-- Främre A3 — mindre -->
    <g opacity="0.90" transform="translate(580 200)">
      <rect x="0" y="0" width="220" height="300" fill="#ffffff" fill-opacity="0.15" rx="2"/>
      <rect x="20" y="20" width="120" height="16" fill="#ffffff" fill-opacity="0.35"/>
      <rect x="20" y="40" width="160" height="6" fill="#ffffff" fill-opacity="0.18"/>
      <rect x="20" y="240" width="80" height="6" fill="#ffffff" fill-opacity="0.20"/>
    </g>
  </g>

  <!-- Diskret "placeholder"-markering nere höger -->
  <g transform="translate(1740 920)" opacity="0.35">
    <rect x="-95" y="-22" width="90" height="20" rx="10" fill="#ffffff" fill-opacity="0.12"/>
    <text x="-50" y="-8" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">PLACEHOLDER</text>
  </g>
</svg>
