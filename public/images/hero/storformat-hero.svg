<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161a2e"/>
      <stop offset="55%" stop-color="#2a2640"/>
      <stop offset="100%" stop-color="#23192a"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#D9222A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D9222A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Bakgrund -->
  <rect width="1920" height="960" fill="url(#bg)"/>
  <rect width="1920" height="960" fill="url(#dots)"/>
  <rect width="1920" height="960" fill="url(#glow)"/>

  <!-- Storformat-motiv: roll up + banderoll + stor affisch -->
  <g transform="translate(1060 120)">
    <!-- Bakre stor banderoll -->
    <g opacity="0.50">
      <rect x="0" y="50" width="640" height="220" fill="#ffffff" fill-opacity="0.08" rx="2"/>
      <!-- Öljetter-prickar -->
      <circle cx="20" cy="70" r="4" fill="#ffffff" fill-opacity="0.25"/>
      <circle cx="620" cy="70" r="4" fill="#ffffff" fill-opacity="0.25"/>
      <circle cx="20" cy="250" r="4" fill="#ffffff" fill-opacity="0.25"/>
      <circle cx="620" cy="250" r="4" fill="#ffffff" fill-opacity="0.25"/>
      <!-- Banderoll-text -->
      <rect x="60" y="120" width="240" height="22" fill="#ffffff" fill-opacity="0.32"/>
      <rect x="60" y="150" width="340" height="14" fill="#ffffff" fill-opacity="0.18"/>
      <rect x="60" y="170" width="280" height="14" fill="#ffffff" fill-opacity="0.18"/>
    </g>

    <!-- Stor affisch / 70x100 (höger) -->
    <g opacity="0.65" transform="translate(440 0)">
      <rect x="0" y="0" width="280" height="420" fill="#ffffff" fill-opacity="0.10" rx="3"/>
      <rect x="30" y="40" width="180" height="22" fill="#ffffff" fill-opacity="0.42"/>
      <rect x="30" y="68" width="220" height="8" fill="#ffffff" fill-opacity="0.18"/>
      <rect x="30" y="82" width="160" height="8" fill="#ffffff" fill-opacity="0.18"/>
      <!-- Accent -->
      <rect x="30" y="360" width="60" height="4" fill="#D9222A" fill-opacity="0.7"/>
      <rect x="30" y="375" width="120" height="6" fill="#ffffff" fill-opacity="0.25"/>
    </g>

    <!-- Roll up (främst, lång och smal) -->
    <g opacity="0.92">
      <!-- Bottenfot -->
      <rect x="40" y="600" width="220" height="14" fill="#ffffff" fill-opacity="0.30" rx="2"/>
      <!-- Själva rullupen -->
      <rect x="80" y="100" width="140" height="500" fill="#ffffff" fill-opacity="0.20" rx="4"/>
      <!-- Logotyp-block -->
      <rect x="95" y="125" width="50" height="14" fill="#D9222A" fill-opacity="0.85" rx="2"/>
      <!-- Rubrik -->
      <rect x="95" y="160" width="110" height="16" fill="#ffffff" fill-opacity="0.60"/>
      <rect x="95" y="180" width="90" height="16" fill="#ffffff" fill-opacity="0.60"/>
      <!-- Subtitel -->
      <rect x="95" y="210" width="105" height="6" fill="#ffffff" fill-opacity="0.30"/>
      <rect x="95" y="220" width="95" height="6" fill="#ffffff" fill-opacity="0.30"/>
      <!-- Centralt visuellt -->
      <circle cx="150" cy="350" r="42" fill="#ffffff" fill-opacity="0.15"/>
      <circle cx="150" cy="350" r="28" fill="#D9222A" fill-opacity="0.55"/>
      <!-- QR-platshållare -->
      <rect x="95" y="510" width="44" height="44" fill="#ffffff" fill-opacity="0.35" rx="2"/>
      <rect x="150" y="520" width="60" height="6" fill="#ffffff" fill-opacity="0.35"/>
      <rect x="150" y="532" width="50" height="6" fill="#ffffff" fill-opacity="0.25"/>
    </g>
  </g>

  <!-- Diskret "placeholder"-markering nere höger -->
  <g transform="translate(1740 920)" opacity="0.35">
    <rect x="-95" y="-22" width="90" height="20" rx="10" fill="#ffffff" fill-opacity="0.12"/>
    <text x="-50" y="-8" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">PLACEHOLDER</text>
  </g>
</svg>
